services:
  - type: web
    name: streamline
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: ALLOWED_USERS
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SYNC_INTERVAL
        value: "180"
